<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Songa Adam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; } #mobile-menu { transition: all 0.3s ease-in-out; }</style>
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="text-2xl font-bold text-green-600">SONGA.A</div>
                <div class="hidden md:flex space-x-8 font-medium">
                    <a href="index.html" class="hover:text-green-600">Home</a>
                    <a href="about.html" class="hover:text-green-600">About</a>
                    <a href="projects.html" class="hover:text-green-600">Projects</a>
                    <a href="developer.html" class="hover:text-green-600 transition">Developer</a>
                    <a href="comments.html" class="hover:text-green-600 transition">Guestbook</a>
                    <a href="contact.html" class="text-green-600">Contact</a>
                </div>
                <div class="md:hidden flex items-center">
                    <button id="menu-toggle" class="text-gray-600 focus:outline-none">
                        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path id="menu-icon" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                    </button>
                </div>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-white border-t border-gray-100 px-4 py-4 space-y-4 shadow-lg">
            <a href="index.html" class="block text-gray-600">Home</a>
            <a href="about.html" class="block text-gray-600">About</a>
            <a href="projects.html" class="block text-gray-600">Projects</a>
            <a href="developer.html" class="block text-gray-600">Developer</a>
            <a href="comments.html" class="block text-gray-600">Guestbook</a>
            <a href="contact.html" class="block text-green-600 font-medium">Contact</a>
        </div>
    </nav>

    <div class="py-20 max-w-2xl mx-auto px-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
            <h1 class="text-3xl font-bold text-green-800 mb-6 text-center">Get in Touch</h1>
            <p class="text-center text-gray-600 mb-10">Have a question or want to collaborate? Send me a message!</p>
            <form action="#" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Full Name</label>
                    <input type="text" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-green-500 focus:outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Email Address</label>
                    <input type="email" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-green-500 focus:outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Message</label>
                    <textarea rows="5" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-green-500 focus:outline-none transition"></textarea>
                </div>
                <button type="submit" class="w-full bg-green-600 text-white font-bold py-4 rounded-lg hover:bg-green-700 transition shadow-lg">Send Message</button>
            </form>
        </div>
    </div>

    <script>
        const btn = document.getElementById('menu-toggle');
        const menu = document.getElementById('mobile-menu');
        const icon = document.getElementById('menu-icon');
        btn.addEventListener('click', () => {
            menu.classList.toggle('hidden');
            if (menu.classList.contains('hidden')) { icon.setAttribute('d', 'M4 6h16M4 12h16m-7 6h7'); } 
            else { icon.setAttribute('d', 'M6 18L18 6M6 6l12 12'); }
        });
    </script>
</body>
</html>
